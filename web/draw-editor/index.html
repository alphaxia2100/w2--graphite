<!doctype html>
<html>
<head>
<meta charset="utf-8" />
<title>Draw editor v1</title>
<link rel="stylesheet" href="https://unpkg.com/@excalidraw/excalidraw@0.18.0/dist/prod/index.css" />
<style>
  :root { --bar: 46px; }
  html, body { margin: 0; height: 100%; width: 100%; font: 14px -apple-system, "Segoe UI", sans-serif; }
  #app { position: absolute; top: var(--bar); left: 0; right: 0; bottom: 0; }
  #promptbar { position: fixed; top: 0; left: 0; right: 0; height: var(--bar); z-index: 6;
    display: flex; align-items: center; gap: 12px; padding: 0 12px; box-sizing: border-box;
    background: #0f172a; color: #e2e8f0; }
  #promptbar .p { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #promptbar b { color: #7dd3fc; }
  #promptbar .opt { display: flex; align-items: center; gap: 6px; font-size: 12px;
    color: #cbd5e1; white-space: nowrap; cursor: pointer; user-select: none; }
  button.primary { background: #2563eb; color: #fff; border: 0; border-radius: 8px;
    padding: 8px 14px; font-weight: 500; cursor: pointer; }
  button.primary:hover { background: #1d4ed8; }
  #status { position: fixed; bottom: 8px; left: 10px; z-index: 5; font-size: 12px; color: #64748b; }
  /* reveal overlay */
  #reveal { position: fixed; inset: 0; z-index: 10; display: none;
    background: rgba(15,23,42,.55); align-items: center; justify-content: center; }
  #reveal .card { background: #fff; color: #0f172a; width: min(860px, 92vw); max-height: 88vh;
    overflow: auto; border-radius: 14px; padding: 22px 26px; box-shadow: 0 20px 60px rgba(0,0,0,.35); }
  #reveal h2 { margin: 0 0 4px; font-size: 19px; font-weight: 500; }
  #reveal h3 { font-size: 15px; font-weight: 500; margin: 18px 0 8px; color: #334155; }
  #reveal .sub { color: #64748b; font-size: 13px; margin-bottom: 6px; }
  .rubric { list-style: none; padding: 0; margin: 0; }
  .rubric li { display: flex; gap: 10px; align-items: flex-start; padding: 7px 0; border-top: 1px solid #eef2f7; }
  .rubric input { margin-top: 3px; transform: scale(1.15); }
  .rubric .w { color: #94a3b8; font-size: 12px; }
  .cols { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .panel { background: #f8fafc; border: 1px solid #e2e8f0; border-radius: 10px; padding: 12px 14px; }
  .panel ul { margin: 6px 0 0; padding-left: 18px; } .panel li { margin: 3px 0; }
  .muted { color: #64748b; }
  .grades { display: flex; gap: 10px; margin-top: 18px; }
  .grades button { flex: 1; border: 1px solid #cbd5e1; background: #fff; border-radius: 10px;
    padding: 12px; font-weight: 500; cursor: pointer; }
  .grades button:hover { border-color: #2563eb; color: #1d4ed8; }
  .g-again { color: #b91c1c; } .g-easy { color: #15803d; }
  #done-msg { margin-top: 14px; color: #15803d; font-weight: 500; display: none; }
  /* trackpad lock-in */
  #tp-outline { position: fixed; display: none; z-index: 4; border: 2px dashed #0d9488;
    border-radius: 10px; background: rgba(13,148,136,.04); pointer-events: none; }
  #tp-outline .lbl { position: absolute; top: -20px; left: 0; font-size: 11px; color: #0d9488; white-space: nowrap; }
  #tp-brush { position: absolute; width: 12px; height: 12px; margin: -6px 0 0 -6px; border-radius: 50%;
    background: #0d9488; box-shadow: 0 0 0 3px rgba(13,148,136,.25); pointer-events: none; }
  body.tp-locked { cursor: none; }
</style>
<script type="importmap">
{
  "imports": {
    "react": "https://esm.sh/react@19.0.0",
    "react-dom": "https://esm.sh/react-dom@19.0.0",
    "react-dom/client": "https://esm.sh/react-dom@19.0.0/client",
    "react/jsx-runtime": "https://esm.sh/react@19.0.0/jsx-runtime",
    "@excalidraw/excalidraw": "https://esm.sh/@excalidraw/excalidraw@0.18.0?external=react,react-dom"
  }
}
</script>
</head>
<body>
<div id="promptbar">
  <div class="p"><b>Prompt:</b> <span id="prompt">loading…</span></div>
  <label class="opt"><input type="checkbox" id="opt-checklist" /> self-check list</label>
  <button class="primary" id="tp-lock" style="display:none; background:#0d9488;">✋ Trackpad draw</button>
  <button class="primary" id="done" disabled>Done — reveal &amp; self-judge</button>
</div>
<div id="app"></div>
<div id="status">loading editor…</div>

<div id="reveal"><div class="card">
  <h2 id="rv-title">Reference</h2>
  <div class="sub">Compare your drawing to the reference, then grade yourself honestly.</div>
  <div id="rv-rubric-section">
    <h3>Did you get these? (tick what your drawing actually showed)</h3>
    <ul class="rubric" id="rv-rubric"></ul>
  </div>
  <div class="cols">
    <div><h3>Reference</h3><div class="panel" id="rv-reference"></div></div>
    <div><h3>What we read from your drawing</h3><div class="panel" id="rv-extracted"></div></div>
  </div>
  <h3>Self-grade</h3>
  <div class="grades">
    <button class="g-again" data-g="again">Again</button>
    <button data-g="hard">Hard</button>
    <button data-g="good">Good</button>
    <button class="g-easy" data-g="easy">Easy</button>
  </div>
  <div id="done-msg">Logged ✓ — (v1 has one card; reload to try again.)</div>
</div></div>

<script type="module">
  const $ = (id) => document.getElementById(id);
  const status = (m) => { $("status").textContent = m; console.log("STATUS: " + m); };
  window.addEventListener("error", (e) => console.log("WINDOW_ERROR: " + (e.message || e)));
  window.addEventListener("unhandledrejection", (e) => console.log("PROMISE_REJECTION: " + (e.reason && e.reason.message || e.reason)));

  let REF = null;
  fetch("./reference-water-cycle.json").then(r => r.json()).then(j => {
    REF = j; $("prompt").textContent = j.prompt; $("rv-title").textContent = "Reference — " + j.title;
  }).catch(e => console.log("REF_LOAD_FAIL: " + e));

  // self-check list: off by default, remembered across sessions
  (function () {
    const cb = $("opt-checklist");
    cb.checked = localStorage.getItem("opt-checklist") === "1";
    cb.addEventListener("change", () => localStorage.setItem("opt-checklist", cb.checked ? "1" : "0"));
  })();

  // ---- extract a typed graph from the Excalidraw scene ----
  const SHAPE = new Set(["rectangle", "ellipse", "diamond"]);
  function extract() {
    const els = (window.__exc?.getSceneElements?.() || []).filter(e => !e.isDeleted);
    const textByContainer = {};
    for (const e of els) if (e.type === "text" && e.containerId) textByContainer[e.containerId] = (e.text || "").trim();
    const nodes = [], nodeLabel = {};
    for (const e of els) if (SHAPE.has(e.type)) {
      const label = textByContainer[e.id] || "(unlabeled)";
      nodeLabel[e.id] = label; nodes.push({ id: e.id, label });
    }
    const edges = [];
    for (const e of els) if (e.type === "arrow" || e.type === "line") {
      const from = e.startBinding && nodeLabel[e.startBinding.elementId];
      const to = e.endBinding && nodeLabel[e.endBinding.elementId];
      edges.push({ from: from || "?", to: to || "?", label: textByContainer[e.id] || "" });
    }
    const freehand = els.filter(e => e.type === "freedraw").length;
    return { nodes, edges, freehand, raw: els.length };
  }

  // ---- render the reveal panel ----
  function resolve(id) { return (REF.nodes.find(n => n.id === id) || {}).label || id; }
  function showReveal() {
    const g = extract();
    console.log("EXTRACTED_GRAPH " + JSON.stringify({ nodes: g.nodes.map(n => n.label), edges: g.edges, freehand: g.freehand }));

    // optional self-check rubric (off by default)
    const useChecklist = $("opt-checklist").checked;
    $("rv-rubric-section").style.display = useChecklist ? "" : "none";
    $("rv-rubric").innerHTML = useChecklist ? REF.rubric.map((it, i) =>
      `<li><input type="checkbox" id="rb${i}" data-w="${it.weight}"><label for="rb${i}">${it.text}
        <span class="w">(×${it.weight})</span></label></li>`).join("") : "";

    // reference panel
    const reqNodes = REF.nodes.filter(n => n.required).map(n => n.label);
    const reqEdges = REF.edges.filter(e => e.required)
      .map(e => `${e.label}: ${resolve(e.from)} → ${resolve(e.to)}${e.direction && e.direction !== "any" ? " (" + e.direction + ")" : ""}`);
    $("rv-reference").innerHTML =
      `<div><b>Reservoirs (nodes):</b><ul>${reqNodes.map(n => `<li>${n}</li>`).join("")}</ul></div>
       <div><b>Processes (edges):</b><ul>${reqEdges.map(e => `<li>${e}</li>`).join("")}</ul></div>`;

    // extracted panel
    $("rv-extracted").innerHTML =
      `<div class="muted">${g.raw} shapes total · ${g.freehand} freehand strokes</div>
       <div><b>Nodes read:</b> ${g.nodes.length ? g.nodes.map(n => n.label).join(", ") : "<span class='muted'>none</span>"}</div>
       <div style="margin-top:6px"><b>Edges read:</b><ul>${
         g.edges.length ? g.edges.map(e => `<li>${e.from} → ${e.to}${e.label ? " (" + e.label + ")" : ""}</li>`).join("") : "<li class='muted'>none</li>"}</ul></div>`;

    $("done-msg").style.display = "none";
    $("reveal").style.display = "flex";
  }

  document.querySelectorAll(".grades button").forEach(b => b.addEventListener("click", () => {
    const grade = b.dataset.g;
    const items = [...document.querySelectorAll("#rv-rubric input")];
    const record = { card: REF.id, selfGrade: grade };
    if (items.length) {
      const gotW = items.filter(i => i.checked).reduce((s, i) => s + (+i.dataset.w), 0);
      const totW = items.reduce((s, i) => s + (+i.dataset.w), 0);
      record.rubricSelfScore = gotW + "/" + totW;
      record.checked = items.filter(i => i.checked).length;
      record.of = items.length;
    }
    console.log("SELF_GRADE_RECORD " + JSON.stringify(record));
    $("done-msg").style.display = "block";
    status("self-graded: " + grade + (record.rubricSelfScore ? " (" + record.rubricSelfScore + ")" : ""));
  }));

  // ---- self-test: inject a drawing, reveal, and self-grade (no human needed) ----
  async function runSelfTest() {
    for (let k = 0; k < 60 && !REF; k++) await new Promise(r => setTimeout(r, 100));
    const Exc = window.__ExcMod;
    const sk = [
      { type: "rectangle", id: "ocean", x: 80, y: 360, width: 130, height: 60, label: { text: "Ocean" } },
      { type: "rectangle", id: "atmos", x: 80, y: 90, width: 150, height: 60, label: { text: "Atmosphere" } },
      { type: "rectangle", id: "clouds", x: 380, y: 90, width: 130, height: 60, label: { text: "Clouds" } },
      { type: "rectangle", id: "land", x: 380, y: 360, width: 130, height: 60, label: { text: "Land" } },
      { type: "arrow", x: 145, y: 355, width: 0, height: -200, start: { id: "ocean" }, end: { id: "atmos" }, label: { text: "Evaporation" } },
      { type: "arrow", x: 235, y: 120, width: 140, height: 0, start: { id: "atmos" }, end: { id: "clouds" }, label: { text: "Condensation" } },
      { type: "arrow", x: 445, y: 155, width: 0, height: 200, start: { id: "clouds" }, end: { id: "land" }, label: { text: "Precipitation" } },
      { type: "arrow", x: 375, y: 390, width: -160, height: 0, start: { id: "land" }, end: { id: "ocean" }, label: { text: "Runoff" } },
    ];
    const els = Exc.convertToExcalidrawElements(sk);
    window.__exc.updateScene({ elements: els });
    console.log("SELFTEST: injected " + els.length + " elements");
    await new Promise(r => setTimeout(r, 400));
    showReveal();
    await new Promise(r => setTimeout(r, 300));
    document.querySelectorAll("#rv-rubric input").forEach(i => (i.checked = true));
    document.querySelector('.grades button[data-g="good"]').click();
    console.log("SELFTEST: complete");
  }

  // ---- trackpad lock-in: absolute-position drawing via synthesized pointer events ----
  window.__trackpad = (function () {
    let locked = false, region = null, drawing = false, last = null;
    function canvasEl() {
      return document.querySelector(".excalidraw__canvas.interactive")
          || document.querySelector(".excalidraw__canvas")
          || document.querySelector("#app canvas");
    }
    function ensureOutline() {
      let o = document.getElementById("tp-outline");
      if (!o) {
        o = document.createElement("div"); o.id = "tp-outline";
        o.innerHTML = '<div class="lbl">trackpad — draw with one finger · Esc to stop</div><div id="tp-brush"></div>';
        document.body.appendChild(o);
      }
      return o;
    }
    function computeRegion() {
      const a = document.getElementById("app").getBoundingClientRect();
      const w = Math.min(620, a.width * 0.62), h = w / 1.6;   // ~trackpad aspect ratio
      return { x: a.left + (a.width - w) / 2, y: a.top + (a.height - h) / 2, w, h };
    }
    function map(nx, ny) { return { x: region.x + nx * region.w, y: region.y + (1 - ny) * region.h }; }
    function fire(type, c, buttons) {
      const el = canvasEl(); if (!el) return;
      el.dispatchEvent(new PointerEvent(type, { clientX: c.x, clientY: c.y, bubbles: true,
        cancelable: true, pointerId: 1, pointerType: "mouse", isPrimary: true, button: 0, buttons }));
    }
    function lock() {
      if (locked) return; locked = true; region = computeRegion();
      const o = ensureOutline();
      Object.assign(o.style, { left: region.x + "px", top: region.y + "px",
        width: region.w + "px", height: region.h + "px", display: "block" });
      try { window.__exc.setActiveTool({ type: "freedraw" }); } catch (e) {}
      document.body.classList.add("tp-locked");
      document.title = "TP:lock";
      console.log("TRACKPAD locked");
    }
    function unlock() {
      if (!locked) return;
      if (drawing && last) { fire("pointerup", last, 0); }
      locked = false; drawing = false;
      const o = document.getElementById("tp-outline"); if (o) o.style.display = "none";
      try { window.__exc.setActiveTool({ type: "selection" }); } catch (e) {}
      document.body.classList.remove("tp-locked");
      document.title = "TP:unlock";
      console.log("TRACKPAD unlocked");
    }
    function onTouch(phase, nx, ny) {
      if (!locked) return;
      const c = map(nx, ny); last = c;
      const b = document.getElementById("tp-brush");
      if (b) { b.style.left = (c.x - region.x) + "px"; b.style.top = (c.y - region.y) + "px"; }
      if (phase === "began") { drawing = true; fire("pointerdown", c, 1); }
      else if (phase === "moved") { if (drawing) fire("pointermove", c, 1); }
      else { if (drawing) { fire("pointerup", c, 0); drawing = false; } }
    }
    return { lock, unlock, onTouch, isLocked: () => locked };
  })();

  async function runTrackpadTest() {
    const sleep = (ms) => new Promise(r => setTimeout(r, ms));
    for (let k = 0; k < 60 && !window.__exc; k++) await sleep(100);
    window.__trackpad.lock(); await sleep(150);
    const path = [[.30, .40], [.38, .46], [.46, .52], [.54, .56], [.62, .58], [.70, .56]];
    window.__trackpad.onTouch("began", path[0][0], path[0][1]); await sleep(30);
    for (let i = 1; i < path.length; i++) { window.__trackpad.onTouch("moved", path[i][0], path[i][1]); await sleep(30); }
    window.__trackpad.onTouch("ended", path[path.length - 1][0], path[path.length - 1][1]); await sleep(250);
    const els = window.__exc.getSceneElements().filter(e => !e.isDeleted);
    console.log("TRACKPAD_TEST freedraw=" + els.filter(e => e.type === "freedraw").length + " totalEls=" + els.length);
    window.__trackpad.unlock();
  }

  // ---- mount Excalidraw (verified working) ----
  try {
    status("importing react + excalidraw…");
    const React = (await import("react")).default;
    const { createRoot } = await import("react-dom/client");
    window.EXCALIDRAW_ASSET_PATH = "https://unpkg.com/@excalidraw/excalidraw@0.18.0/dist/prod/";
    const Exc = await import("@excalidraw/excalidraw");
    window.__ExcMod = Exc;
    status("mounting…");
    createRoot($("app")).render(
      React.createElement(Exc.Excalidraw, {
        excalidrawAPI: (api) => {
          window.__exc = api; window.EDITOR_MOUNTED = true;
          $("done").disabled = false;
          console.log("EDITOR_MOUNTED");
          status("editor ready — draw the water cycle, then click Done");
          const _p = new URLSearchParams(location.search);
          if (_p.get("selftest")) setTimeout(runSelfTest, 900);
          if (_p.get("trackpad")) {
            const tb = $("tp-lock"); tb.style.display = "";
            tb.addEventListener("click", () => window.__trackpad.lock());
          }
          if (_p.get("tptest")) setTimeout(runTrackpadTest, 1200);
        },
      })
    );
    $("done").addEventListener("click", () => { if (REF) showReveal(); else status("reference still loading…"); });
  } catch (err) {
    console.log("MOUNT_EXCEPTION: " + (err && err.stack || err && err.message || err));
    status("mount failed — see console");
  }
</script>
</body>
</html>
